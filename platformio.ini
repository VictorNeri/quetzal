; PlatformIO migration for ESP32-DIV HaleHound firmware.
;
; Open this folder in VS Code with the PlatformIO extension installed, then use:
;   PlatformIO: Build
;   PlatformIO: Upload
;   PlatformIO: Monitor
;
; The original ESP32-DIV V1 target is the default known-good hardware family.
; The NM-CYD-C5 environment is provided for the ESP32-C5 porting work; it is
; expected to expose additional compile issues until the C5 API migration is done.

[platformio]
default_envs = esp32div-original
src_dir = .
include_dir = .

[common]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = deep+
src_filter =
  +<ESP32-DIV.ino>
  +<*.cpp>
  +<*.h>
  -<.git/>
  -<docs/>
  -<bootloader.bin>
  -<boot_app0.bin>
  -<partitions.bin>
  -<ESP32-DIV.bin>
  -<flash_*.sh>
  -<flash_*.bat>
build_flags =
  -I.
  -Iinclude
  -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/FS/src
  -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/SPIFFS/src
  -include User_Setup.h
  -DUSER_SETUP_LOADED=1
  -Wl,--allow-multiple-definition
lib_deps =
  ; TFT_eSPI is vendored in lib/TFT_eSPI (2.5.43 + NM-CYD-C5 ESP32-C5 processor patch).
  ; Stock bodmer/TFT_eSPI has no ESP32-C5 support (TFT_eSPI_ESP32.c uses HSPI_HOST,
  ; SPI_MOSI_DLEN_REG, and direct GPIO registers absent on C5). The C5 branch is additive
  ; and inactive on classic ESP32, so the original-V1 build is unaffected.
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
  https://github.com/xreef/PCF8574_library.git
  nrf24/RF24@^1.4.11
  sui77/rc-switch@^2.6.4
  kosme/arduinoFFT@^1.6.2
  SmartRC-CC1101-Driver-Lib@^2.5.7
  FS
  SPIFFS

[env:esp32div-original]
extends = common
platform = espressif32@^6.10.0
board = esp32dev
board_build.partitions = huge_app.csv
build_flags =
  ${common.build_flags}
  -DESP32_DIV_BOARD_PROFILE=ESP32_DIV_BOARD_ORIGINAL_V1

[env:nm-cyd-c5]
extends = common
; ESP32-C5 support requires the newer pioarduino platform / Arduino core line.
; Pinned to the version the NM-CYD-C5 vendor documents as known-good (Arduino 3.3.6).
; The floating "stable" tag installed framework-arduinoespressif32-libs only, leaving
; the Arduino core package unresolved (FRAMEWORK_DIR=None crash before compile).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
board = esp32-c5-devkitc-1
board_build.flash_size = 16MB
; PSRAM intentionally left unconfigured: the esp32-c5-devkitc-1 profile is
; "no PSRAM", and forcing psram_type=opi made the bootloader attempt an octal
; PSRAM init that hangs before app code runs (dark screen). The firmware uses no
; PSRAM (originally an ESP32-WROOM-32U board without any), so this is safe. If a
; PSRAM-equipped C5 is targeted later, set the correct psram_type here.
; The esp32-c5-devkitc-1 board defaults to a 4 MB/1.25 MB-app layout; the
; NM-CYD-C5 has 16 MB flash. Use a 16 MB table with a 4 MB app (firmware ~1.8 MB).
board_build.partitions = partitions_c5_16mb.csv
build_flags =
  ${common.build_flags}
  -DESP32_DIV_BOARD_PROFILE=ESP32_DIV_BOARD_NM_CYD_C5
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  ; Arduino ESP32 core 3.x split the network stack into a separate Network library that
  ; WiFiGeneric.h includes. The project's LDF does not chain bundled core libs (see the
  ; explicit FS/SPIFFS includes above), so add Network's src dir on the include path.
  -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/Network/src
; The C5 has no Bluedroid host (NimBLE only), so the firmware's BLE features are
; migrated to NimBLE-Arduino for this board. Kept out of [common] so the original
; ESP32 build keeps using the core Bluedroid BLE library.
lib_deps =
  ${common.lib_deps}
  h2zero/NimBLE-Arduino@^2.2.3
